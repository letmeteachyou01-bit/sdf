<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fine Dine | Kanpur</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
text-align:center;
padding:20px;
background:linear-gradient(45deg,#ff512f,#dd2476);
}

header h1{
margin:0;
font-size:40px;
}

header p{
color:#eee;
}

.hero{
width:100%;
height:350px;
background-size:cover;
background-position:center;
transition:1s;
}

.container{
width:90%;
margin:auto;
}

.search{
text-align:center;
margin:20px 0;
}

.search input{
width:60%;
padding:12px;
border-radius:6px;
border:none;
}

.categories{
text-align:center;
margin-bottom:20px;
}

.categories button{
margin:5px;
background:#ff512f;
color:white;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.item{
background:#1b1b1b;
border-radius:12px;
padding:15px;
text-align:center;
transition:.3s;
}

.item:hover{
transform:scale(1.05);
}

.item img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

.item h3{
color:#ff7b54;
}

button{
background:linear-gradient(45deg,#ff512f,#dd2476);
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
color:white;
}

button:disabled{
background:gray;
cursor:not-allowed;
}

.qty{
display:flex;
justify-content:center;
gap:10px;
margin:10px 0;
}

.cart{
background:#1a1a1a;
margin-top:40px;
padding:20px;
border-radius:10px;
}

.cart-item{
display:flex;
justify-content:space-between;
}

.total{
color:#ff7b54;
font-size:20px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:5px;
}

input::placeholder,
textarea::placeholder{
font-weight:bold;
color:#ffb347;
letter-spacing:1px;
}

input:focus,
textarea:focus{
outline:none;
box-shadow:0 0 8px #ff512f;
}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#222;
padding:30px;
display:none;
border-radius:10px;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
text-decoration:none;
font-size:22px;
}

footer{
margin-top:40px;
padding:20px;
text-align:center;
color:#aaa;
}

</style>
</head>

<body>

<header>
<h1>Fine Dine</h1>
<p>Good Food Good Mood | Kanpur</p>
</header>

<div class="hero" id="hero"></div>

<div class="container">

<div class="search">
<input placeholder="Search food..." onkeyup="searchFood(this.value)">
</div>

<div class="categories">
<button onclick="filterCategory('all')">All</button>
<button onclick="filterCategory('burger')">Burger</button>
<button onclick="filterCategory('pizza')">Pizza</button>
<button onclick="filterCategory('chinese')">Chinese</button>
<button onclick="filterCategory('drink')">Drinks</button>
<button onclick="filterCategory('dessert')">Dessert</button>
</div>

<div class="menu" id="menu"></div>

<div class="cart">

<h2>Your Order</h2>

<div id="cartItems"></div>

<p>Delivery Charge ₹40</p>

<div class="total">
Total ₹ <span id="total">0</span>
</div>

<h3>Customer Details</h3>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>

<br><br>

<button id="orderBtn" onclick="sendOrder()" disabled>Confirm Order</button>

</div>

</div>

<div class="popup" id="popup">
<h2>Order Sent!</h2>
<p>Check WhatsApp</p>
</div>

<a class="whatsapp" href="https://wa.me/917388275761">💬</a>

<footer>
© Fine Dine Restaurant
</footer>

<script>

let heroImages=[
"https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1600&q=60",
"https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=1600&q=60",
"https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&w=1600&q=60"
]

let heroIndex=0

function changeHero(){
document.getElementById("hero").style.backgroundImage="url("+heroImages[heroIndex]+")"
heroIndex++
if(heroIndex>=heroImages.length) heroIndex=0
}

setInterval(changeHero,4000)
changeHero()

let allFoods=[

{name:"Classic Burger",price:120,cat:"burger",img:"https://images.unsplash.com/photo-1550547660-d9450f859349"},
{name:"Cheese Burger",price:140,cat:"burger",img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd"},
{name:"Paneer Burger",price:150,cat:"burger",img:"https://images.unsplash.com/photo-1606755962773-d324e0a13086"},

{name:"Margherita Pizza",price:220,cat:"pizza",img:"https://i.ibb.co/4n8g9zqx/f1be366cc6cbf3f9cf29f5c25bb51ca4.jpg"},
{name:"Farmhouse Pizza",price:240,cat:"pizza",img:"https://images.unsplash.com/photo-1513104890138-7c749659a591"},
{name:"Cheese Burst Pizza",price:260,cat:"pizza",img:"https://i.ibb.co/QFh6QLc1/b1fbec0f1a305576dcb8fc88f9f92f07.jpg"},

{name:"Hakka Noodles",price:150,cat:"chinese",img:"https://images.unsplash.com/photo-1585032226651-759b368d7246"},
{name:"Veg Manchurian",price:180,cat:"chinese",img:"https://i.ibb.co/1Y2fYXPn/1558da1d18b614469ed1d1c2966baf54.jpg"},
{name:"Chilli Paneer",price:200,cat:"chinese",img:"https://images.unsplash.com/photo-1603894584373-5ac82b2ae398"},

{name:"Cold Coffee",price:90,cat:"drink",img:"https://images.unsplash.com/photo-1509042239860-f550ce710b93"},
{name:"Chocolate Shake",price:120,cat:"drink",img:"https://images.unsplash.com/photo-1572490122747-3968b75cc699"},

{name:"Chocolate Cake",price:180,cat:"dessert",img:"https://images.unsplash.com/photo-1578985545062-69928b1d9587"},
{name:"Cupcake",price:120,cat:"dessert",img:"https://images.unsplash.com/photo-1486427944299-d1955d23e34d"}

]

let foods=[...allFoods]
let cart=[]
let total=0

function renderMenu(){

let menu=document.getElementById("menu")
menu.innerHTML=""

foods.forEach((food,i)=>{

menu.innerHTML+=`

<div class="item">

<img loading="lazy"
src="${food.img}?auto=format&fit=crop&w=400&q=60">

<h3>${food.name}</h3>
<p>₹${food.price}</p>

<div class="qty">
<button onclick="changeQty(${i},-1)">-</button>
<span id="qty${i}">1</span>
<button onclick="changeQty(${i},1)">+</button>
</div>

<button onclick="addToCart(${i})">Add</button>

</div>

`

})

}

renderMenu()

function changeQty(i,c){

let q=document.getElementById("qty"+i)
let v=parseInt(q.innerText)

v+=c
if(v<1)v=1

q.innerText=v

}

function addToCart(i){

let qty=parseInt(document.getElementById("qty"+i).innerText)
let food=foods[i]

cart.push({name:food.name,price:food.price,qty})
total+=food.price*qty

updateCart()

}

function updateCart(){

let div=document.getElementById("cartItems")
div.innerHTML=""

cart.forEach((item,index)=>{

div.innerHTML+=`

<div class="cart-item">
<span>${item.name} x ${item.qty}</span>
<button onclick="removeItem(${index})">X</button>
</div>

`

})

document.getElementById("total").innerText=total+40

let btn=document.getElementById("orderBtn")

if(cart.length===0){
btn.disabled=true
}else{
btn.disabled=false
}

}

function removeItem(i){

total-=cart[i].price*cart[i].qty
cart.splice(i,1)
updateCart()

}

function searchFood(t){

t=t.toLowerCase()
foods=allFoods.filter(f=>f.name.toLowerCase().includes(t))
renderMenu()

}

function filterCategory(c){

if(c=="all"){
foods=[...allFoods]
}else{
foods=allFoods.filter(f=>f.cat==c)
}

renderMenu()

}

function sendOrder(){

if(cart.length===0){
alert("Cart is empty")
return
}

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let address=document.getElementById("address").value

if(!name||!phone||!address){
alert("Fill all details")
return
}

let msg="New Order Fine Dine %0A%0A"

msg+="Name:"+name+"%0A"
msg+="Phone:"+phone+"%0A"
msg+="Address:"+address+"%0A%0A"

msg+="Order:%0A"

cart.forEach(item=>{
msg+=item.name+" x "+item.qty+"%0A"
})

msg+="Total ₹"+(total+40)

document.getElementById("popup").style.display="block"

setTimeout(()=>{
window.open("https://wa.me/917388275761?text="+msg,"_blank")
},1200)

}

</script>

</body>
</html>
